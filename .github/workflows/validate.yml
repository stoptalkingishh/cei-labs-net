name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pfsense-xml:
    name: pfSense XML
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate XML syntax
        run: |
          python -c "import glob, xml.etree.ElementTree as ET; [ET.parse(f) for f in glob.glob('config/pfsense/*.xml')]; print('all pfSense XML well-formed')"

      - name: Check firewall rule ordering invariant
        run: python scripts/check_firewall_rule_order.py

  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: "**/*.md"

  doc-links:
    name: Documentation links
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check local Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --exclude '^file://.*/(cei-labs-engine|CEI-Labs-Wargames)/'
            "**/*.md"
          fail: true
